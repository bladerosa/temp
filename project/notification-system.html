<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<title>通知系统 · 原型</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />

<!-- CCPayment Design System tokens + Poppins -->
<link rel="stylesheet" href="ccpayment/colors_and_type.css">

<style>
  /* ==========================================================
     Local overrides for the notification prototype
     - Uses CCPayment tokens as the source of truth
     - Adds Chinese fallback (PingFang / Microsoft YaHei) to Poppins
     ========================================================== */
  :root {
    /* Re-alias the legacy variable names this prototype used, to CCPayment tokens.
       This keeps inline styles referencing --primary, --border etc. still working,
       but every color/radius/shadow now comes from the brand system. */
    --bg: var(--bg-neutral);                 /* #F4F6F8 */
    --panel: var(--bg-paper);                /* #FFFFFF */
    --sidebar: var(--bg-paper);
    --sidebar-active: var(--primary-lighter);/* #D8E7FE */
    --border: var(--border-subtle);
    --border-strong: var(--border-strong);
    --text: var(--text-primary);
    --text-2: var(--text-secondary);
    --text-3: var(--grey-600);
    /* Primary stays the CCPayment blue (#3C6FF5) via --primary from tokens */
    --primary-hover: var(--primary-dark);
    --primary-soft: var(--primary-lighter);
    --danger: var(--error);
    --success: var(--success);
    --warning: var(--warning);
    --radius: var(--radius-md);
    --shadow-sm: var(--shadow-z1);
    --shadow-md: var(--shadow-z4);
    --shadow-lg: var(--shadow-dropdown);
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    /* Poppins as primary (from tokens) + CJK fallback */
    font-family: "Poppins", "PingFang SC", "Microsoft YaHei", -apple-system,
                 BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg-neutral);
    color: var(--text-primary);
    font-size: var(--body2-size);
    line-height: var(--body2-lh);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }
  #root { min-height: 100vh; }

  /* Subtle scrollbar matching the brand grey ramp */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: var(--grey-300); border-radius: 10px; border: 2px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background: var(--grey-400); background-clip: padding-box; border: 2px solid transparent; }
  ::-webkit-scrollbar-track { background: transparent; }

  /* Hover transitions, per CCPayment motion rules (~120ms ease-out) */
  .nav-row { transition: background 120ms ease-out, color 120ms ease-out; }
  .nav-row:hover { background: var(--bg-subtle); }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="src/icons.jsx"></script>
<script type="text/babel" src="src/ui.jsx"></script>
<script type="text/babel" src="src/DatePicker.jsx"></script>
<script type="text/babel" src="src/ConditionBuilder.jsx"></script>

<script type="text/babel" src="src/Layout.jsx"></script>
<script type="text/babel" src="src/App.jsx"></script>
</body>
</html>
