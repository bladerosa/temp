<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F6F7FB;
    --panel: #FFFFFF;
    --sidebar: #FFFFFF;
    --sidebar-active: #EEF0FF;
    --border: #E6E8EE;

    --success: #2EB67D;

    --radius: 8px;

    --shadow-lg: 0 10px 30px rgba(16,24,40,.08);

  html, body {
    margin: 0; padding: 0;

    color: var(--text);
